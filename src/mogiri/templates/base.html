<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}mogiri{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="site-nav">
        <div class="nav-inner">
            <a href="{{ url_for('dashboard.index') }}" class="nav-brand">
                <span class="nav-brand-icon">M</span>
                mogiri
            </a>
            <div class="nav-links">
                <a href="{{ url_for('dashboard.index') }}"
                   class="nav-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}">Dashboard</a>
                <a href="{{ url_for('jobs.job_list') }}"
                   class="nav-link {% if request.endpoint and request.endpoint.startswith('jobs.') %}active{% endif %}">Jobs</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        mogiri &mdash; simple job manager
    </footer>
</body>
</html>
